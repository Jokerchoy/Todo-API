<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ 待办事项管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 待办事项管理系统</h1>
            <p class="subtitle">高效管理你的每一天</p>
        </header>

        <!-- 登录/注册区域 -->
        <div id="auth-section" class="auth-section">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="window.switchTab('login')">登录</button>
                <button class="tab-btn" onclick="window.switchTab('register')">注册</button>
            </div>

            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="用户名" class="auth-input">
                <input type="password" id="login-password" placeholder="密码" class="auth-input">
                <button onclick="window.login()" class="btn btn-primary">登录</button>
            </div>

            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="用户名 (3-50字符)" class="auth-input">
                <input type="email" id="reg-email" placeholder="邮箱" class="auth-input">
                <input type="password" id="reg-password" placeholder="密码 (至少6位)" class="auth-input">
                <button onclick="window.register()" class="btn btn-primary">注册</button>
            </div>
        </div>

        <div id="app-section" class="app-section" style="display: none;">
            <div class="user-bar">
                <span>👤 <span id="username-display"></span></span>
                <button onclick="window.logout()" class="btn btn-logout">退出登录</button>
            </div>

            <div class="create-todo">
                <h3>➕ 添加新任务</h3>
                <div class="todo-form">
                    <input type="text" id="todo-title" placeholder="任务标题 *" class="todo-input">
                    <input type="text" id="todo-desc" placeholder="任务描述（可选）" class="todo-input">
                    <select id="todo-priority" class="todo-select">
                        <option value="1">🟢 低优先级</option>
                        <option value="2" selected>🟡 中优先级</option>
                        <option value="3">🔴 高优先级</option>
                    </select>
                    <button onclick="window.createTodo()" class="btn btn-success">创建任务</button>
                </div>
            </div>

            <div class="filter-bar">
                <h3>📋 我的任务</h3>
                <div class="filters">
                    <button class="filter-btn active" onclick="window.filterTodos('all')">全部</button>
                    <button class="filter-btn" onclick="window.filterTodos('active')">未完成</button>
                    <button class="filter-btn" onclick="window.filterTodos('completed')">已完成</button>
                </div>
            </div>

            <div id="todo-list" class="todo-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
